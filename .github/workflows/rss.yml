name: Generar RSS Pro

on:
  push:
    paths:
      - feeds.json
      - generar-rss.js
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: node generar-rss.js

      - name: Commit cambios
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add rss.xml
          git diff --staged --quiet || git commit -m "Actualizar RSS"
          git push
